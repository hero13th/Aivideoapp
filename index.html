<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Creator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>🤖 AI Creator</h1>

    <textarea id="prompt" placeholder="Describe your idea..."></textarea>

    <div class="buttons">
      <button onclick="generateImage()">🖼 Generate Image</button>
      <button onclick="generateVideo()">🎬 Generate Video</button>
    </div>

    <div id="output">

      <img id="image" style="width:100%; display:none; border-radius:10px; margin-top:10px;" />

      <video id="video" controls style="width:100%; display:none; border-radius:10px; margin-top:10px;"></video>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
